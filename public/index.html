<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI论文词汇学习</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
</head>
<body>
  <div id="app">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">AI Vocab</h1>
        <div style="display:flex;align-items:center;gap:12px">
          <a href="/kids" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:8px 16px;border-radius:12px;text-decoration:none;font-weight:700;font-size:14px;white-space:nowrap;box-shadow:0 2px 8px rgba(102,126,234,0.4);transition:transform 0.2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">🌈 儿童学习</a>
          <div class="header-stats" id="headerStats"></div>
        </div>
      </div>
    </header>

    <!-- 标签栏 -->
    <nav class="tabs">
      <button class="tab active" data-tab="study" onclick="switchTab('study')">今日学习</button>
      <button class="tab" data-tab="review" onclick="switchTab('review')">
        艾宾浩斯复习
        <span class="badge" id="dueBadge" style="display:none">0</span>
      </button>
      <button class="tab" data-tab="library" onclick="switchTab('library')">词库浏览</button>
      <button class="tab" data-tab="stats" onclick="switchTab('stats')">学习统计</button>
      <button class="tab" data-tab="add" onclick="switchTab('add')">添加单词</button>
    </nav>

    <!-- 主内容区 -->
    <main class="main">

      <!-- 今日学习 -->
      <section id="tab-study" class="tab-content active">
        <div class="section-header">
          <h2>今日学习</h2>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-outline" onclick="startFlashcards()">卡片学习</button>
            <button class="btn btn-primary" onclick="generateSession()">生成新批次</button>
          </div>
        </div>
        <div class="session-info" id="sessionInfo"></div>
        <div class="word-cards" id="studyCards"></div>
      </section>

      <!-- 艾宾浩斯复习 -->
      <section id="tab-review" class="tab-content">
        <div class="section-header">
          <h2>艾宾浩斯复习</h2>
          <div class="ebbinghaus-info">
            <div class="curve-label">记忆曲线间隔</div>
            <div class="curve-stages">
              <span class="stage" data-level="0">新词</span>
              <span class="stage" data-level="1">1天</span>
              <span class="stage" data-level="2">2天</span>
              <span class="stage" data-level="3">4天</span>
              <span class="stage" data-level="4">7天</span>
              <span class="stage" data-level="5">15天</span>
              <span class="stage" data-level="6">30天</span>
              <span class="stage" data-level="7">已掌握</span>
            </div>
          </div>
        </div>
        <div id="reviewContent"></div>
      </section>

      <!-- 词库浏览 -->
      <section id="tab-library" class="tab-content">
        <div class="section-header">
          <h2>词库浏览</h2>
          <div class="filters">
            <input type="text" id="searchInput" placeholder="搜索单词或中文..." oninput="debounceSearch()">
            <select id="categoryFilter" onchange="libraryPage=1; loadLibrary()">
              <option value="">全部分类</option>
            </select>
            <select id="learnedFilter" onchange="libraryPage=1; loadLibrary()">
              <option value="">全部状态</option>
              <option value="false">未学会</option>
              <option value="true">已学会</option>
            </select>
            <select id="batchFilter" onchange="libraryPage=1; loadLibrary()">
              <option value="">全部批次</option>
            </select>
            <select id="sortFilter" onchange="libraryPage=1; loadLibrary()">
              <option value="">默认排序</option>
              <option value="last_reviewed_desc">最近学习 ↓</option>
              <option value="last_reviewed_asc">最近学习 ↑</option>
              <option value="mastery_desc">熟练度 ↓</option>
              <option value="mastery_asc">熟练度 ↑</option>
              <option value="review_count_desc">学习次数 ↓</option>
              <option value="review_count_asc">学习次数 ↑</option>
              <option value="remembered_desc">记住次数 ↓</option>
              <option value="remembered_asc">记住次数 ↑</option>
              <option value="forgotten_desc">忘记次数 ↓</option>
              <option value="forgotten_asc">忘记次数 ↑</option>
              <option value="category_asc">分类 A-Z</option>
              <option value="word_asc">单词 A-Z</option>
            </select>
          </div>
        </div>
        <div class="word-list" id="libraryList"></div>
        <div class="pagination" id="libraryPagination"></div>
      </section>

      <!-- 学习统计 -->
      <section id="tab-stats" class="tab-content">
        <div class="section-header"><h2>学习统计</h2></div>
        <div id="statsContent"></div>
      </section>

      <!-- 添加单词 -->
      <section id="tab-add" class="tab-content">
        <div class="section-header"><h2>添加新单词</h2></div>
        <form class="add-form" id="addPendingForm" onsubmit="addWordToPending(event)">
          <div class="form-group" style="display:flex;gap:8px;align-items:flex-end">
            <div style="flex:1">
              <label>英文单词</label>
              <input type="text" id="pendingWordInput" placeholder="输入单词，回车加入待添加词库" autocomplete="off" autocapitalize="none" spellcheck="false">
            </div>
            <button type="submit" class="btn btn-primary" style="white-space:nowrap">加入词库</button>
          </div>
        </form>
        <div class="pending-section" id="pendingSection">
          <div class="pending-header">
            <span>待添加词库</span>
            <span class="badge" id="pendingBadge" style="display:none">0</span>
          </div>
          <div class="pending-list" id="pendingList"><p class="pending-empty">输入单词或长按例句中的词可加入此列表</p></div>
          <div class="pending-actions" style="margin-top:12px;display:flex;gap:8px;align-items:center">
            <button class="btn btn-primary" id="enrichBtn" onclick="enrichPending()">一键补全并入库</button>
            <span class="enrich-status" id="enrichStatus" style="font-size:13px;color:#888"></span>
          </div>
        </div>
        <div class="batch-section" id="batchSection" style="margin-top:24px">
          <div class="pending-header"><span>补全批次历史</span></div>
          <div class="batch-list" id="batchList"><p class="pending-empty">还没有补全批次</p></div>
        </div>
      </section>
    </main>

    <!-- 单词详情弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <!-- 卡片学习模式 -->
    <div class="flashcard-overlay" id="flashcardOverlay">
      <div class="flashcard-topbar">
        <div class="flashcard-progress" id="fcProgress">0 / 0</div>
        <div class="flashcard-progress-bar"><div class="flashcard-progress-fill" id="fcProgressFill"></div></div>
        <button class="flashcard-close" onclick="closeFlashcards()" aria-label="关闭">&times;</button>
      </div>
      <div class="flashcard-stage" id="fcStage"></div>
      <div class="flashcard-controls">
        <button class="btn btn-ghost" id="fcPrevBtn" onclick="flashcardPrev()">← 上一个</button>
        <div class="flashcard-review-btns" id="fcReviewBtns"></div>
        <button class="btn btn-ghost" id="fcNextBtn" onclick="flashcardNext()">下一个 →</button>
      </div>
      <div class="flashcard-hint">点击单词听发音 · 空格翻面 · ←/→ 切换 · A/S/D 展开例句 · ↑ 记住 ↓ 忘记 · Esc 退出</div>
    </div>

    <!-- 长按选词菜单 -->
    <div class="word-context-menu" id="wordContextMenu">
      <div class="wcm-word" id="wcmWord"></div>
      <button class="wcm-item" onclick="contextMenuSearch('baidu')">百度搜索</button>
      <button class="wcm-item" onclick="contextMenuSearch('google')">Google 搜索</button>
      <button class="wcm-item" onclick="contextMenuAddPending()">加入待添加词库</button>
    </div>

    <!-- Toast 提示 -->
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
